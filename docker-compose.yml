services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dydi
      POSTGRES_PASSWORD: dydi
      POSTGRES_DB: dydi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dydi"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      GROUPS_SERVICE_URL: http://groups-service:8082
      HABITS_SERVICE_URL: http://habits-service:8083
      REALTIME_SERVICE_URL: http://realtime-service:8084
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      ALLOWED_ORIGINS: http://localhost:5173
    depends_on:
      - groups-service
      - habits-service
      - realtime-service

  groups-service:
    build: ./groups-service
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      DATABASE_URL: postgres://dydi:dydi@postgres:5432/dydi?sslmode=disable
      MAX_GROUP_SIZE: 8
    depends_on:
      postgres:
        condition: service_healthy

  habits-service:
    build: ./habits-service
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      DATABASE_URL: postgres://dydi:dydi@postgres:5432/dydi?sslmode=disable
      REALTIME_SERVICE_URL: http://realtime-service:8084
      PUNISHMENT_CATALOG_PATH: ./punishments.json
    depends_on:
      postgres:
        condition: service_healthy

  realtime-service:
    build: ./realtime-service
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      MAX_CONNECTIONS_PER_GROUP: 8
      PING_INTERVAL_SECONDS: 30
      PONG_WAIT_SECONDS: 60
      WRITE_WAIT_SECONDS: 10

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
