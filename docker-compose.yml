services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      GROUPS_SERVICE_URL: http://groups-service:8082
      HABITS_SERVICE_URL: http://habits-service:8083
      REALTIME_SERVICE_URL: http://realtime-service:8084
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL}
      ALLOWED_ORIGINS: http://localhost:5173
      # Shared secret the gateway stamps on every proxied request so the backend
      # services can trust it came through here (JWT already validated).
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      - groups-service
      - habits-service
      - realtime-service

  groups-service:
    build: ./groups-service
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      DATABASE_URL: ${DATABASE_URL}
      MAX_GROUP_SIZE: 8
      HABITS_SERVICE_URL: http://habits-service:8083
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}

  habits-service:
    build: ./habits-service
    ports:
      - "8083:8083"
    environment:
      PORT: 8083
      DATABASE_URL: ${DATABASE_URL}
      REALTIME_SERVICE_URL: http://realtime-service:8084
      PUNISHMENT_CATALOG_PATH: ./punishments.json
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}

  realtime-service:
    build: ./realtime-service
    ports:
      - "8084:8084"
    environment:
      PORT: 8084
      MAX_CONNECTIONS_PER_GROUP: 8
      PING_INTERVAL_SECONDS: 30
      WRITE_WAIT_SECONDS: 10
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      # Used to verify a user belongs to a group before accepting their WebSocket.
      GROUPS_SERVICE_URL: http://groups-service:8082

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    command: sh -c "npm install && npm run dev -- --host"

  mobile:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./mobile:/app
      - /app/node_modules
    ports:
      - "8081:8081"
    environment:
      EXPO_PUBLIC_API_URL: http://localhost:8080
      EXPO_PUBLIC_SUPABASE_URL: ${VITE_SUPABASE_URL}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    command: sh -c "rm -rf node_modules package-lock.json && npm install --legacy-peer-deps && npx expo start --web --clear"
