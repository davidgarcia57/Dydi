name: Keep Services Awake

# DESHABILITADO como keep-alive automático: el scheduler de GitHub Actions se
# retrasa >15 min y Render free se duerme a los 15 min, así que daba falsa
# cobertura. El keep-alive REAL es un cron externo (cron-job.org) que hace un
# POST a /ops/wake del gateway cada 12 min en ventana 8am-8pm, y el gateway despierta en
# cascada a los 3 servicios. Este workflow queda SOLO para disparo manual.
on:
  workflow_dispatch: # Ping manual desde la pestaña Actions si hace falta

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Wake API Gateway
        env:
          GATEWAY_URL: ${{ secrets.GATEWAY_URL }}
          WAKE_TOKEN: ${{ secrets.WAKE_TOKEN }}
        run: |
          curl -f -s -X POST "$GATEWAY_URL/ops/wake" -H "X-Wake-Token: $WAKE_TOKEN" || echo "Error al despertar los servicios"
