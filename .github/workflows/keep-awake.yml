name: Keep Services Awake

on:
  schedule:
    # Cada 12 min entre 14:00 UTC (8 AM UTC-6) y 02:59 UTC (8 PM UTC-6).
    # OJO: el scheduler de GitHub Actions suele retrasarse >15 min, y Render free
    # se duerme a los 15 min — para keep-alive fiable usar un pinger externo
    # (cron-job.org / UptimeRobot) apuntando a /health del gateway.
    - cron: '*/12 14-23,0-2 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Gateway /health
        run: |
          curl -f -s https://dydi-25hj.onrender.com/health || echo "Error al despertar los servicios"
