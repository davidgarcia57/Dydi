name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-services:
    name: Build & Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, groups-service, habits-service, realtime-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ${{ matrix.service }}/go.mod

      - name: Tidy
        working-directory: ${{ matrix.service }}
        run: go mod tidy

      - name: Build
        working-directory: ${{ matrix.service }}
        run: go build ./...

      - name: Test
        working-directory: ${{ matrix.service }}
        run: go test ./...

  frontend:
    name: Build & Test — frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Test
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build
