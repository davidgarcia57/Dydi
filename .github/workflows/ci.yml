name: CI

# CI == ./verify.sh: la misma suite en Docker que corre el equipo en local.
# La logica vive en verify.sh y en el composite action .github/actions/verify-action.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Un push nuevo cancela el run anterior del mismo ref (ahorra minutos).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go - ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, groups-service, habits-service, realtime-service]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/verify-action
        with:
          target: go:${{ matrix.service }}
          cache-path: |
            .gocache
            .gomodcache
          cache-key: ${{ runner.os }}-go-${{ matrix.service }}-${{ hashFiles('**/go.sum', '.golangci.yml', 'verify.sh') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.service }}-
            ${{ runner.os }}-go-

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/verify-action
        with:
          target: frontend
          cache-path: .npmcache
          cache-key: ${{ runner.os }}-npm-frontend-${{ hashFiles('frontend/package-lock.json', 'verify.sh') }}
          restore-keys: |
            ${{ runner.os }}-npm-frontend-
            ${{ runner.os }}-npm-

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/verify-action
        with:
          target: mobile
          cache-path: .npmcache
          cache-key: ${{ runner.os }}-npm-mobile-${{ hashFiles('mobile/package-lock.json', 'verify.sh') }}
          restore-keys: |
            ${{ runner.os }}-npm-mobile-
            ${{ runner.os }}-npm-

  # Gate unico: depende de todos. Marca ESTE como el unico required status check
  # en Settings -> Branches. Asi renombrar/agregar jobs NO rompe branch protection.
  ci-success:
    name: CI Success
    needs: [go, frontend, mobile]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.go.result }}" != "success" ] \
          || [ "${{ needs.frontend.result }}" != "success" ] \
          || [ "${{ needs.mobile.result }}" != "success" ]; then
            echo "::error::CI fallo  (go=${{ needs.go.result }} frontend=${{ needs.frontend.result }} mobile=${{ needs.mobile.result }})"
            exit 1
          fi
          echo "Todo verde."
