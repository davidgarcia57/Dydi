name: Code Quality

# Capa de calidad de codigo (separada de CI, que compila y testea).
# Aqui solo revisamos formato y analisis estatico — nunca modifica tu codigo,
# solo falla si algo no cumple, para que el arreglo lo haga quien sube el cambio.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-quality:
    name: Go quality — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, groups-service, habits-service, realtime-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ matrix.service }}/go.sum

      # gofmt: formato oficial de Go. Falla listando los archivos sin formatear.
      - name: gofmt (formato)
        working-directory: ${{ matrix.service }}
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Archivos sin formatear. Corre 'gofmt -w .' en ${{ matrix.service }}:"
            echo "$unformatted"
            exit 1
          fi

      # go vet: analisis estatico basico incluido con Go.
      - name: go vet (analisis estatico)
        working-directory: ${{ matrix.service }}
        run: go vet ./...

      # golangci-lint: linter agregado (errcheck, staticcheck, unused, ...).
      # Lee la config compartida en .golangci.yml de la raiz del repo.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: ${{ matrix.service }}

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      # ESLint: calidad de codigo JS/Vue (variables sin usar, errores, etc.).
      - name: ESLint
        working-directory: frontend
        run: npm run lint

      # Prettier: chequeo de formato (no modifica, solo verifica).
      - name: Prettier (formato)
        working-directory: frontend
        run: npm run format:check
